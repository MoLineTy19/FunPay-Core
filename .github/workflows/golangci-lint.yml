name: golangci-lint
on:
  push:
    branches:
      - main

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: latest
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...