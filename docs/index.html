<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FunPay Core Engine API</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    html { box-sizing: border-box; }
    *, *::before, *::after { box-sizing: inherit; }
    body { margin: 0; }
    /* Тёмный верхний бар под бренд */
    .topbar {
      background: #1a1a2e;
      padding: 12px 24px;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar a { color: #a78bfa; text-decoration: none; font-weight: 600; }
    .topbar .hint { color: #9ca3af; font-size: 13px; }
  </style>
</head>
<body>
  <div class="topbar">
    <span>🛠️ <strong>FunPay Core Engine API</strong></span>
    <span class="hint">
      Try-it-out идёт на ваш локальный движок. Запустите
      <code>./engine</code> и задайте адрес в поле «Servers» (по умолчанию
      <code>http://127.0.0.1:8731</code>).
    </span>
    <span style="margin-left:auto">
      <a href="https://github.com/MoLineTy19/FunPay-Core">GitHub ↗</a>
    </span>
  </div>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    window.onload = () => {
      window.ui = SwaggerUIBundle({
        url: "./swagger.json",
        dom_id: "#swagger-ui",
        deepLinking: true,
        docExpansion: "none",
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 1,
        persistAuthorization: true,
        // Загоняем X-Engine-Token в Authorized один раз — он подставится во все try-it-out.
        requestInterceptor: (req) => {
          return req;
        }
      });
    };
  </script>
</body>
</html>
